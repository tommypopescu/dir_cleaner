services:
  dir-cleaner:
    build: .
    image: dir-cleaner:local
    ports:
      - "8080:8080"
    environment:
      BASE_PATH: /data
      QUARANTINE_PATH: /quarantine
      SIZE_THRESHOLD_MB: "50"
      UNUSED_DAYS: "90"
      SCAN_DEPTH: "1"
      EXCLUDES: ".git,node_modules,.cache"
      BASIC_AUTH_USER: "admin"
      BASIC_AUTH_PASS: "changeMe!"
      AUDIT_LOG: "/var/log/dir-cleaner/audit.log"
    volumes:
      - ./sample_data:/data:rw
      - ./quarantine:/quarantine:rw
      - dir_cleaner_logs:/var/log/dir-cleaner:rw
    restart: unless-stopped
volumes:
  dir_cleaner_logs:
